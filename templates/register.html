<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Usuário – Nerdy Security</title>
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="icon" href="/static/images/Logo_Nerdy_Ico2.jpg" type="image/jpeg">
</head>
<body class="auth-page">

<div class="grid-bg"></div>

<div class="auth-card">

  <div class="auth-brand">
    <img src="/static/images/Logo_Nerdy_Ico2.jpg" alt="Nerdy">
    <span class="auth-brand-text">NERDY//SEC</span>
  </div>

  <div class="auth-title">Novo Usuário</div>
  <div class="auth-subtitle">// CADASTRO DE ACESSO</div>

  <form method="POST" class="auth-form">

    <div class="form-field">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" placeholder="Nome Sobrenome" required>
    </div>

    <div class="form-field">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" name="usuario" placeholder="nome_usuario" required>
    </div>

    <div class="form-field">
      <label for="senha">Senha</label>
      <div class="pass-wrap">
        <input type="password" id="senha" name="senha" placeholder="••••••••" required>
        <button type="button" class="pass-toggle" onclick="togglePass()" aria-label="Mostrar senha">👁</button>
      </div>
    </div>

    <div class="form-field">
      <label for="ip">IP Autorizado <span style="color:var(--muted);font-size:9px;">(opcional)</span></label>
      <input type="text" id="ip" name="ip" placeholder="192.168.0.1">
    </div>

    <button type="submit" class="auth-submit">[ CADASTRAR USUÁRIO ]</button>

  </form>

  <hr class="auth-divider">

  <a href="/dashboard" class="auth-back">← Voltar ao dashboard</a>

</div>

<script>
function togglePass() {
  const s = document.getElementById('senha');
  s.type = s.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>

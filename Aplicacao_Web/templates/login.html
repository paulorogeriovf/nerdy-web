<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Nerdy Security</title>
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="icon" href="/static/images/Logo_Nerdy_Ico2.png" type="image/jpeg">
</head>
<body class="auth-page">

<div class="grid-bg"></div>

<div class="auth-card">

  <div class="auth-brand">
    <img src="/static/images/Logo_Nerdy_Ico2.png" alt="Nerdy">
    <span class="auth-brand-text">NERDY//SEC</span>
  </div>

  <div class="auth-title">Entrar na plataforma</div>
  <div class="auth-subtitle">// SECURITY INTELLIGENCE DASHBOARD</div>

  {% if erro %}
  <div class="auth-error">⚠ {{ erro }}</div>
  {% endif %}

  <form method="POST" class="auth-form">

    <div class="form-field">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" name="usuario" placeholder="seu_usuario" required autocomplete="username">
    </div>

    <div class="form-field">
      <label for="senha">Senha</label>
      <div class="pass-wrap">
        <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="pass-toggle" onclick="togglePass()" aria-label="Mostrar senha">👁</button>
      </div>
    </div>

    <button type="submit" class="auth-submit">[ AUTENTICAR ]</button>

  </form>

  <a href="/" class="auth-back">← Voltar ao início</a>

</div>

<script>
function togglePass() {
  const s = document.getElementById('senha');
  s.type = s.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
